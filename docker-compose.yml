services:
  spotify:
    build: .
    image: spotify-automation
    stdin_open: true
    tty: true
    ports:
      - "${SPOTIFY_REDIRECT_PORT:-8765}:${SPOTIFY_REDIRECT_PORT:-8765}"
    volumes:
      - ./spotify-token-cache:/app/.cache  # bind mount — token persists on host
      - ./.env:/app/.env:ro                # credentials mounted read-only

